{% load static %}
<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – CampusLink</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="dark-mode">
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
      <h1>CampusLink</h1>
      <p>Connect, collaborate, and grow together</p>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-error" style="margin-bottom:12px;">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px; padding:12px;">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Register here</a>
    </div>
  </div>
</div>
<script>
  (function() {
    const saved = localStorage.getItem('campusTheme');
    if (saved === 'light') document.body.classList.remove('dark-mode');
  })();
</script>
</body>
</html>
