{% extends 'base.html' %}
{% block title %}{{ action }} Group – CampusLink{% endblock %}
{% block content %}
<div style="max-width:560px; margin:0 auto;">
  <div class="page-header-row">
    <div class="page-header"><h1>{{ action }} Group</h1></div>
    <a href="{% url 'group_list' %}" class="btn"><i class="fas fa-arrow-left"></i> Back</a>
  </div>
  <div class="card">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Group Name *</label>
        <input type="text" name="name" class="form-control" placeholder="e.g. Web Dev Squad" required value="{{ form.name.value|default:'' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3" placeholder="What is this group about?">{{ form.description.value|default:'' }}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Cover Image (optional)</label>
        <input type="file" name="cover" class="form-control" accept="image/*">
      </div>
      <div style="display:flex; gap:10px; margin-top:8px;">
        <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> {{ action }} Group</button>
        <a href="{% url 'group_list' %}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
