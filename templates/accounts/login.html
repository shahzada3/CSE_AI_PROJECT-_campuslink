{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – CampusLink</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="dark-mode">
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="width:48px;height:48px;font-size:20px;border-radius:14px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#7F77DD,#9b7fe8);">
        <i class="fas fa-graduation-cap" style="color:#fff;"></i>
      </div>
      <h1 style="font-size:22px;font-weight:700;text-align:center;">CampusLink</h1>
      <p style="color:var(--text-secondary);font-size:13px;text-align:center;margin-top:4px;">Connect, collaborate, and grow together</p>
    </div>
    {% if messages %}{% for message in messages %}<div class="alert alert-error" style="margin-bottom:14px;">{{ message }}</div>{% endfor %}{% endif %}
    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;padding:12px;font-size:15px;">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>
    <div style="text-align:center;margin-top:20px;color:var(--text-secondary);font-size:13px;">
      Don't have an account? <a href="{% url 'register' %}" style="color:var(--accent);font-weight:500;">Register here</a>
    </div>
  </div>
</div>
<script>(function(){const s=localStorage.getItem('campusTheme');if(s==='light')document.body.classList.remove('dark-mode');})();</script>
</body>
</html>
